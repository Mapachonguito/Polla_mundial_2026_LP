    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding-bottom: 120px; touch-action: manipulation; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

    p { color: var(--muted); font-size: 12px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
    input, select { width: 100%; background: #0F1422; border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 10px; margin-bottom: 12px; font-family: inherit; font-size: 14px; }
    button { width: 100%; background: var(--lime); color: var(--bg); border: none; border-radius: 8px; padding: 11px; font-weight: 700; cursor: pointer; font-size: 14px; }
    button:hover { opacity: 0.9; }
    .tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn { flex: 1; min-width: 90px; background: #1C2438; color: var(--muted); border: 1px solid var(--line); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; }
    .tab-btn.active { background: var(--lime); color: var(--bg); }
    .hidden { display: none; }
    .badge { background: rgba(201,255,61,.15); color: var(--lime); padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; display: inline-block; margin-right: 6px; }
    .match { background: #0F1422; border: 1px solid #1C2438; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .match-header { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
    .match-date { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .match-inputs { display: flex; gap: 6px; align-items: center; margin-top: 8px; }
    .match-inputs input { margin: 0; width: 50px; text-align: center; padding: 8px 0; }
    table { width: 100%; border-collapse: collapse; }
    table td { padding: 10px; border-bottom: 1px solid var(--line); font-size: 13px; }
    table th { background: #0F1422; padding: 10px; text-align: left; font-weight: 700; font-size: 13px; }
    hr { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
    .pool-info { background: linear-gradient(135deg, #15203a, #151B2C); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .pool-amount { font-size: 32px; color: var(--lime); font-weight: 700; margin-top: 4px; }
    .prize-chip { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; flex: 1; font-size: 11px; margin-right: 8px; margin-bottom: 8px; }
    .prize-chip .label { color: var(--muted); font-weight: 700; font-size: 10px; }
    .prize-chip .amount { color: var(--lime); font-weight: 700; margin-top: 3px; }
    .leader-row { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .leader-pos { font-size: 22px; font-weight: 700; width: 30px; }
    .leader-info { flex: 1; min-width: 0; }
    .leader-name { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
    .leader-stats { font-size: 11px; color: var(--muted); }
    .leader-prize { font-size: 14px; color: var(--lime); font-weight: 700; text-align: right; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,13,22,.95); border-top: 1px solid var(--line); display: flex; justify-content: center; gap: 4px; padding: 8px; backdrop-filter: blur(8px); z-index: 50; flex-wrap: wrap; }
    .nav-btn { background: none; color: var(--muted); border: none; padding: 6px 14px; font-size: 11px; font-weight: 700; cursor: pointer; flex: 1; min-width: 80px; }
    .nav-btn.active { color: var(--lime); }
    #content { padding-bottom: 100px; }
    .admin-section { background: #0F1422; border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .admin-section h3 { color: var(--lime); font-size: 14px; margin-bottom: 10px; }
    .day-filter { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; overflow-x: auto; }
    .day-btn { background: #1C2438; color: var(--muted); border: 1px solid var(--line); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .day-btn.active { background: var(--lime); color: var(--bg); }
    .login-container { display: flex; flex-direction: column; gap: 10px; }
    .login-buttons { display: flex; gap: 10px; }
    .login-buttons button { flex: 1; background: #1C2438; color: var(--text); padding: 12px; }
    .login-buttons button.active { background: var(--lime); color: var(--bg); }
    .save-all-btn { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--lime); color: var(--bg); border: none; padding: 12px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; z-index: 40; box-shadow: 0 4px 12px rgba(201,255,61,.3); }
    .save-all-btn:hover { opacity: 0.9; }
    .paid-user { background: rgba(201,255,61,.1); border-left: 3px solid var(--lime); }
    .pending-user { background: rgba(255,90,60,.1); border-left: 3px solid var(--coral); }
  
    /* Esconder flechitas de number input */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>

    window.autosavePred = async function(mid) {
      let h = document.getElementById(`h_${mid}`)?.value;

        state.config = cfg.data?.length ? cfg.data[0] : null;
        (u.data || []).forEach(x => state.users[x.id] = x);
        (m.data || []).forEach(x => state.matches.push(x));
        (p.data || []).forEach(x => state.preds[x.userid + '::' + x.matchid] = { home: x.homescore, away: x.awayscore });
        (pd.data || []).forEach(x => state.podium[x.userid] = { first: x.first, second: x.second, third: x.third });
        
        // Cargar sesión guardada desde localStorage
        const savedUser = localStorage.getItem('polla_user');
        if(savedUser && state.users[savedUser]) {
          state.me = savedUser;
          console.log('✓ Sesión restaurada:', savedUser);
        }
        
        // Restaurar pestaña guardada
        const savedTab = localStorage.getItem('polla_tab');
        if(savedTab) {
          state.tab = savedTab;
          console.log('✓ Pestaña restaurada:', savedTab);
        }
        
        if(!state.config) {
          console.log('⚠️ No hay config, mostrando crear polla');
          render();
        } else if(!state.matches.length) {
          console.log('⚠️ No hay partidos, insertando 72...');
          const matchesData = SCHEDULE.map((x, i) => ({ 
            id: 'm' + (i+1), 
            home: x[0], 
            away: x[1], 
            group_name: x[2], 
            datetime: x[3], 
            homescore: '', 
            awayscore: '', 
            finished: false 
          }));
          const matchResult = await sb.from('polla_trabajo_matches').insert(matchesData);
          if(matchResult.error) throw new Error('Matches: ' + matchResult.error.message);
          state.matches = matchesData;
          console.log('✓ Partidos insertados');
          render();
        } else {
          console.log('✓ Todo cargado correctamente');
          render();
        }
      } catch(e) { 
        console.error('❌ Error en init:', e); 
        render(); 
      }
      
      // Verificar cada segundo si hay CAMBIOS en bloqueos de partidos
      let bloqueoAnterior = {};
      setInterval(() => {
        if(state.me && state.tab === 'partidos') {
          let cambio = false;
          state.matches.forEach(m => {
            const estaBloqueado = isLocked(m);
            if(bloqueoAnterior[m.id] !== estaBloqueado) {
              cambio = true;
              bloqueoAnterior[m.id] = estaBloqueado;
            }
          });
          if(cambio) render(); // Solo re-renderizar si cambió el estado de bloqueo
        }
      }, 500); // Verificar cada 500ms para ser más rápido
    }

    function actualizarReloj() {
      const ahora = new Date();
      // Mismo cálculo que isLocked usa internamente para ser 100% sincronizado
      const formatter = new Intl.DateTimeFormat('es-CL', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
        timeZone: 'America/Santiago'
      });
      const partes = formatter.formatToParts(ahora);
      const h = partes.find(p => p.type === 'hour').value;
      const m = partes.find(p => p.type === 'minute').value;
      const s = partes.find(p => p.type === 'second').value;
      const relojEl = document.getElementById('reloj-chile');
      if(relojEl) relojEl.textContent = `🕐 ${h}:${m}:${s}`;
    }

    function hashPw(s) { let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h)+s.charCodeAt(i); return "h"+(h>>>0).toString(16); }
    function isLocked(m) { return m.finished || (m.datetime && new Date(m.datetime).getTime() <= Date.now()); }
    function fmtDate(iso) { try { const d = new Date(iso); return d.toLocaleDateString('es-CL', {day:'numeric', month:'short'}) + ' ' + d.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'}); } catch { return iso; } }
    function getDay(iso) { try { return new Date(iso).toLocaleDateString('es-CL', {day:'numeric', month:'short'}); } catch { return ''; } }
    function fmtMoney(n, c) { try { return new Intl.NumberFormat("es-CL", { style: "currency", currency: c||"CLP", maximumFractionDigits: 0 }).format(Math.round(n||0)); } catch { return "$"+Math.round(n||0); } }

    function renderNav() {
      const tabs = [{ id: 'partidos', label: 'Partidos' }, { id: 'resumen', label: 'Resumen' }, { id: 'tabla', label: 'Tabla' }, { id: 'estadisticas', label: 'Estadísticas' }, { id: 'reglas', label: 'Reglas' }];
      if(state.me && state.users[state.me]?.role === 'admin') tabs.push({ id: 'admin', label: 'Admin' });
      navEl.innerHTML = tabs.map(t => `<button class="nav-btn ${state.tab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');
    }

    function savePendingInputs() {

          else if((ph > pa && mh > ma) || (ph < pa && mh < ma) || (ph === pa && mh === ma)) ptsPartidos += scoring.outcome;
        });

      }).sort((a,b) => {

            else if((ph > pa && mh > ma) || (ph < pa && mh < ma) || (ph === pa && mh === ma)) { status = '🟡'; color = 'var(--gold)'; pts = ` <strong style="color:var(--gold);">+${scoring.outcome} pts</strong>`; }

      html += `<div class="prize-chip"><div class="label">🥈 2º (${prizes.second}%)</div><div class="amount">${fmtMoney(pozo*prizes.second/100, currency)}</div></div>`;
      html += `<div class="prize-chip"><div class="label">🥉 3º (${prizes.third}%)</div><div class="amount">${fmtMoney(pozo*prizes.third/100, currency)}</div></div>`;
      html += `<div class="prize-chip"><div class="label">🎯 Exactos (${prizes.perfect}%)</div><div class="amount">${fmtMoney(pozo*prizes.perfect/100, currency)}</div></div>`;
      html += `</div>`;
      
      html += `<h2 style="margin-top:20px;margin-bottom:12px;">Tabla de Posiciones</h2>`;
      
      const rows = Object.keys(state.users).map(uid => {
        const u = state.users[uid];
        
        // Calcular puntos CORRECTAMENTE
        let pts = 0;
        Object.keys(state.preds).forEach(k => {
          if(!k.startsWith(uid + '::')) return;
          const mid = k.split('::')[1];
          const m = state.matches.find(x => x.id === mid);
          if(!m || !m.finished) return; // Solo partidos terminados
          
          const mh = +m.homescore;
          const ma = +m.awayscore;
          const ph = +state.preds[k].home;
          const pa = +state.preds[k].away;
          
          if(ph === mh && pa === ma) pts += scoring.exact; // Marcador perfecto
          else if((ph > pa && mh > ma) || (ph < pa && mh < ma) || (ph === pa && mh === ma)) pts += scoring.outcome; // Solo resultado
        });
        
        let bonoMundial = 0;
        // Solo contar puntos si TODOS los 3 resultados reales están ingresados
        const podiumCompleto = podiumReal.first && podiumReal.second && podiumReal.third;
        if(state.podium[uid] && podiumCompleto) {
          // Solo sumar puntos por los lugares donde el usuario apostó
          if(state.podium[uid].first && state.podium[uid].first === podiumReal.first) bonoMundial += scoring.champion;
          if(state.podium[uid].second && state.podium[uid].second === podiumReal.second) bonoMundial += scoring.second;
          if(state.podium[uid].third && state.podium[uid].third === podiumReal.third) bonoMundial += scoring.third;
        }
        
        return { uid, name: u.displayname, pts, bonoMundial, total: pts + bonoMundial };

      rows.forEach((r, i) => {

          if(!m || !m.finished) return false;
          const mh = +m.homescore;
          const ma = +m.awayscore;
          const ph = +state.preds[k].home;
          const pa = +state.preds[k].away;
          return ph === mh && pa === ma;
        }).length;
        
        const resultados = Object.keys(state.preds).filter(k => {

          const ma = +m.awayscore;
          const ph = +state.preds[k].home;
          const pa = +state.preds[k].away;
          return (ph > pa && mh > ma) || (ph < pa && mh < ma) || (ph === pa && mh === ma);
        }).length;

          if(!k.startsWith(r.uid + '::')) return false;
          const m = state.matches.find(x => x.id === k.split('::')[1]);
          return m && m.finished;
        }).length;
        
        const prize = i < 3 ? pozo * ([prizes.first, prizes.second, prizes.third][i] || 0) / 100 : 0;
        html += `<tr><td style="text-align:center;"><strong>${i+1}</strong></td><td style="text-align:center;"><strong>${r.name}</strong></td><td style="text-align:center;"><strong>${r.total}</strong></td><td style="text-align:center;">${exactos}</td><td style="text-align:center;">${resultados}</td><td style="text-align:center;"><strong>${numPartidosFinalizados}</strong></td><td style="text-align:center;color:var(--lime);font-weight:700;">+${r.bonoMundial}</td></tr>`;
      });
      
      html += `</tbody></table></div>`;
      
      el.innerHTML = html;
      saveAllEl.innerHTML = '';
    }

    window.createPool = async function() {
      const poolName = document.getElementById('poolName').value || 'Polla Mundial 2026';
      const adminName = document.getElementById('adminName').value;
      const adminEmail = document.getElementById('adminEmail').value;
      const adminPw = document.getElementById('adminPw').value;
      if(!adminName || !adminEmail || !adminPw) return alert('Llena todos los campos');
      
      // Validar email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRegex.test(adminEmail)) return alert('Por favor ingresa un email válido');
      
      try {
        // Generar usuario a partir del nombre (minúsculas, con espacios permitidos)
        const adminUser = adminName.toLowerCase().trim();
        console.log('1. Admin user generado:', adminUser);
        
        const config = { poolname: poolName, scoring: {exact:5, outcome:3, champion:10, second:5, third:2} };
        console.log('2. Config creado:', config);
        
        // Verificar si ya existe una polla
        const existe = await sb.from('polla_trabajo_config').select('id').eq('id', '1');
        console.log('3. Verificación de config existente:', existe);
        if(existe.data?.length) return alert('⚠️ La polla ya fue creada. No puedes crear otra.');
        
        // Guardar CONFIG en Supabase
        console.log('4. Insertando config...');
        const configResult = await sb.from('polla_trabajo_config').insert([{ id: '1', ...config }]);
        console.log('5. Resultado config:', configResult);
        if(configResult.error) throw new Error('Config: ' + configResult.error.message);
        
        // Guardar USUARIO en Supabase
        const pwHash = hashPw(adminPw);
        console.log('6. Insertando usuario...');
        const userResult = await sb.from('polla_trabajo_users').insert([{ id: adminUser, displayname: adminName, email: adminEmail, pw: pwHash, pwd: adminPw, role: 'admin', paid: false }]);
        console.log('7. Resultado usuario:', userResult);
        if(userResult.error) throw new Error('User: ' + userResult.error.message);
        
        // Insertar PARTIDOS (todos de una vez)
        console.log('8. Insertando 72 partidos...');
        const matchesData = SCHEDULE.map((x, i) => ({ 
          id: 'm' + (i+1), 
          home: x[0], 
          away: x[1], 
          group_name: x[2], 
          datetime: x[3], 
          homescore: '', 
          awayscore: '', 
          finished: false 
        }));
        const matchResult = await sb.from('polla_trabajo_matches').insert(matchesData);
        if(matchResult.error) throw new Error('Matches: ' + matchResult.error.message);
        console.log('9. Partidos insertados:', matchResult.data?.length);
        
        // Actualizar estado local
        state.config = config;
        state.users[adminUser] = { id: adminUser, displayname: adminName, email: adminEmail, pw: pwHash, pwd: adminPw, role: 'admin', paid: false };
        state.matches = SCHEDULE.map((x,i) => ({ id: 'm'+(i+1), home: x[0], away: x[1], group_name: x[2], datetime: x[3], homescore: '', awayscore: '', finished: false }));
        state.me = adminUser;
        
        console.log('10. ✅ TODO GUARDADO CORRECTAMENTE');
        alert(`✅ ¡Polla creada exitosamente!\n\nTu usuario: ${adminUser}\nContraseña: (la que ingresaste)\n\nAhora comparte este link con tus amigos.`);
        render();
      } catch(e) {
        console.error('❌ ERROR COMPLETO:', e);
        alert('❌ Error: ' + (e.message || 'No se pudo crear la polla.\n\nAbre la consola (F12) para ver detalles.'));
      }
    };

    let authMode = 'login';
    window.setMode = function(m) { 
      authMode = m;
      // Limpiar campos
      document.getElementById('user').value = '';
      document.getElementById('pw').value = '';
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('pw_reg').value = '';
      
      // Mostrar/ocultar campos
      document.getElementById('loginFields')?.classList.toggle('hidden', m==='reg');
      document.getElementById('regFields')?.classList.toggle('hidden', m==='login');
      
      // Cambiar botón activo
      document.querySelectorAll('.login-buttons button').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && m === 'login') || (i === 1 && m === 'reg'));
      });
    };
    
    window.doAuth = async function() {
      try {
        // Validar que authMode sea válido
        if(!['login', 'reg'].includes(authMode)) {
          return alert('Error: Modo de autenticación inválido. Recarga la página.');
        }
        
        if(authMode === 'login') {
          const userField = document.getElementById('user');
          const pwField = document.getElementById('pw');
          
          if(!userField || !pwField) {
            console.error('Campos no encontrados', { userField, pwField });
            return alert('Error: Los campos de login no están visibles. Intenta refrescar la página.');
          }
          
          const email = (userField.value || '').toLowerCase().trim();
          const pw = (pwField.value || '').trim();
          
          console.log('Login - Valores leídos:', { email, pw, emailLength: email.length, pwLength: pw.length });
          
          if(!email || !pw) {
            return alert('Llena todos los campos.\n\nCampo correo: ' + (email ? '✓' : '✗') + '\nCampo contraseña: ' + (pw ? '✓' : '✗'));
          }
          
          // Validar email
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if(!emailRegex.test(email)) return alert('Por favor ingresa un email válido');
          
          const u = await sb.from('polla_trabajo_users').select('*').eq('email', email);
          console.log('Login - Usuario buscado por email:', email, 'Resultado:', u);
          
          if(!u.data?.length) return alert(`No encontramos una cuenta con el email "${email}". ¿Está seguro que se registró?`);
          if(u.data[0].pw !== hashPw(pw)) return alert('Contraseña incorrecta');
          
          const userId = u.data[0].id; // El id es el nombre de usuario
          state.users[userId] = u.data[0];
          state.me = userId;
          localStorage.setItem('polla_user', userId);
        } else {
          const nameField = document.getElementById('name');
          const emailField = document.getElementById('email');
          const pwRegField = document.getElementById('pw_reg');
          
          if(!nameField || !emailField || !pwRegField) {
            return alert('Error: Los campos no están visibles. Intenta de nuevo.');
          }
          
          const name = (nameField.value || '').trim();
          const email = (emailField.value || '').trim();
          const pw = (pwRegField.value || '').trim();
          
          if(!name || !email || !pw) {
            return alert('❌ Por favor completa todos los campos:\n\n' +
              'Nombre: ' + (name ? '✓' : '✗') + '\n' +
              'Correo: ' + (email ? '✓' : '✗') + '\n' +
              'Contraseña: ' + (pw ? '✓' : '✗'));
          }
          
          // Validar email básico
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if(!emailRegex.test(email)) return alert('Por favor ingresa un email válido');
          
          // Generar usuario automático basado en nombre (con espacios permitidos, minúsculas)
          const user = name.toLowerCase().trim();
          
          console.log('Registro - Nombre:', name, 'Email:', email, 'Usuario generado:', user);
          
          // Verificar que no exista usuario
          const exists = await sb.from('polla_trabajo_users').select('*').eq('id', user);
          if(exists.data?.length) return alert('Este nombre ya está registrado. Usa otro nombre.');
          
          // Verificar que no exista email
          const existsEmail = await sb.from('polla_trabajo_users').select('*').eq('email', email);
          if(existsEmail.data?.length) return alert('Este email ya está registrado.');
          
          const result = await sb.from('polla_trabajo_users').insert([{ id: user, displayname: name, email: email, pw: hashPw(pw), pwd: pw, role: 'participant', paid: false }]);
          console.log('Registro - Resultado:', result);
          
          if(result.error) {
            alert('Error al registrar: ' + result.error.message);
            return;
          }
          
          state.users[user] = { id: user, displayname: name, email: email, pw: hashPw(pw), pwd: pw, role: 'participant', paid: false };
          state.me = user;
          localStorage.setItem('polla_user', user);
          alert('✓ Registrado correctamente como: ' + user);
        }
        render();
      } catch(e) {
        console.error('Error en doAuth:', e);
        alert('Error: ' + e.message);
      }
    };

    window.doLogout = function() { 
      state.me = null; 
      state.tab = 'partidos'; 
      state.selectedDay = null; 
      state.pendingSaves = {}; 
      localStorage.removeItem('polla_user');
      render(); 
    };
    
    window.reiniciarPolla = async function() {
      if(!confirm('⚠️ ¿ESTÁS SEGURO?\n\nEsto borrará TODA la polla:\n- Todos los usuarios\n- Todos los partidos\n- Todas las apuestas\n- Todo el podio\n\nNo se puede deshacer.')) return;
      
      try {
        console.log('🔄 Reiniciando polla...');
        
        // Borrar en orden inverso (respetando foreign keys)
        await sb.from('polla_trabajo_podium').delete().gte('id', 0);
        console.log('✓ Podium eliminado');
        
        await sb.from('polla_trabajo_predictions').delete().gte('id', 0);
        console.log('✓ Predictions eliminado');
        
        await sb.from('polla_trabajo_matches').delete().neq('id', '');
        console.log('✓ Matches eliminado');
        
        await sb.from('polla_trabajo_users').delete().neq('id', '');
        console.log('✓ Users eliminado');
        
        await sb.from('polla_trabajo_config').delete().neq('id', '');
        console.log('✓ Config eliminado');
        
        alert('✅ Polla completamente reiniciada. Ahora puedes crear una nueva.');
        doLogout();
      } catch(e) {
        console.error('Error reiniciando:', e);
        alert('❌ Error: ' + e.message);
      }
    };
    
    window.showRecoverPassword = async function() {
      const email = prompt('Ingresa tu correo para recuperar tu contraseña:');
      if(!email) return;
      
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRegex.test(email)) return alert('Email inválido');
      
      try {
        const result = await sb.from('polla_trabajo_users').select('id, displayname, pwd').eq('email', email);
        
        if(!result.data?.length) {
          return alert('No encontramos un usuario con ese email');
        }
        
        const user = result.data[0];
        alert(`✅ Recuperación de contraseña\n\nUsuario: ${user.id}\nContraseña: ${user.pwd}`);
      } catch(e) {
        console.error('Error recuperando contraseña:', e);
        alert('Error: ' + e.message);
      }
    };
    // Scroll position memory - guardar posición en cada pestaña
    const scrollPositions = {};
    
    window.setTab = function(t) { 
      // Guardar scroll actual ANTES de cambiar pestaña
      scrollPositions[state.tab] = window.scrollY || 0;
      
      state.tab = t; 
      state.selectedDay = null; 
      localStorage.setItem('polla_tab', t);
      render(); 
      
      // Restaurar scroll DESPUÉS de renderizar
      setTimeout(() => {
        const savedScroll = scrollPositions[t] || 0;
        window.scrollTo(0, savedScroll);
      }, 0);
    };
    
    // Swipe detection
    // Swipe desactivado - cambiar pestañas solo con botones
    window.filterDay = function(d) { state.selectedDay = d === '' ? null : d; render(); };
    
    window.deleteMatch = async function(mid) {
      try {
        await sb.from('polla_trabajo_matches').delete().eq('id', mid);
        state.matches = state.matches.filter(m => m.id !== mid);
        Object.keys(state.preds).forEach(k => {
          if(k.endsWith('::' + mid)) delete state.preds[k];
        });
        alert('✓ Partido eliminado');
        render();
      } catch(e) {
        console.error(e);
        alert('Error al eliminar');
      }
    };
    
    window.saveAllPreds = async function() {
      const allMatches = state.matches;
      let saved = 0;
      
      for(const m of open) {
        const h = document.getElementById(`h_${m.id}`)?.value;
        const a = document.getElementById(`a_${m.id}`)?.value;
        if(h !== undefined && h !== '' && a !== undefined && a !== '') {
          const exist = await sb.from('polla_trabajo_predictions').select('*').eq('userId', state.me).eq('matchId', m.id);
          const key = state.me + '::' + m.id;
          
          if(exist.data?.length) {
            await sb.from('polla_trabajo_predictions').update({ homescore: h !== undefined && h !== '' ? +h : null, awayscore: a !== undefined && a !== '' ? +a : null }).eq('id', exist.data[0].id);
          } else {
            await sb.from('polla_trabajo_predictions').insert([{ id: Date.now() + saved + '', userId: state.me, matchId: m.id, homescore: h !== undefined && h !== '' ? +h : null, awayscore: a !== undefined && a !== '' ? +a : null }]);
          }
          
          state.preds[key] = { home: +h, away: +a };
          saved++;
        }
      }
      
      state.pendingSaves = {};
      alert(`✓ ${saved} pronóstico(s) guardado(s)`);
      render();
    };

    window.savePodium = function() {
      const first = document.getElementById('first').value;
      const second = document.getElementById('second').value;
      const third = document.getElementById('third').value;
      state.podium[state.me] = { first, second, third };
      alert('✓ Podio guardado');
      render();
    };

    window.togglePaid = async function(uid) {
      const u = state.users[uid];
      u.paid = !u.paid;
      await sb.from('polla_trabajo_users').update({ paid: u.paid }).eq('id', uid);
      render();
    };

    window.showPassword = function(uid) {
      const u = state.users[uid];
      const pwHashed = u.pw;
      // Como la contraseña está hasheada, no podemos recuperarla
      // Pero podemos permitir al admin resetear a una nueva
      const newPw = prompt(`Usuario: ${uid}\n\nLa contraseña actual está hasheada.\n\nIngresa una nueva contraseña para resetear (o deja vacío para cancelar):`);
      if(newPw === null || newPw === '') return;
      if(newPw.length < 3) return alert('La contraseña debe tener al menos 3 caracteres');
      
      u.pw = hashPw(newPw);
      sb.from('polla_trabajo_users').update({ pw: u.pw }).eq('id', uid);
      alert(`✓ Contraseña de ${u.displayname} reseteada a: "${newPw}"`);
    };

    window.deleteParticipant = async function(uid) {
      const userName = state.users[uid].displayname;
      if(!confirm(`¿Eliminar a ${userName}? Podrá volver a registrarse si lo desea.`)) return;
      try {
        // Primero eliminar predicciones
        await sb.from('polla_trabajo_predictions').delete().eq('userid', uid);
        // Luego eliminar usuario
        await sb.from('polla_trabajo_users').delete().eq('id', uid);
        delete state.users[uid];
        Object.keys(state.preds).forEach(k => {
          if(k.startsWith(uid + '::')) delete state.preds[k];
        });
        alert(`✓ ${userName} eliminado correctamente`);
        render();
      } catch(e) {
        console.error('Error eliminando participante:', e);
        alert('Error al eliminar: ' + e.message);
      }
    };

    window.saveAllMatches = async function() {
      let saved = 0;
      for(const m of state.matches) {
        const h = document.getElementById(`res_h_${m.id}`)?.value;
        const a = document.getElementById(`res_a_${m.id}`)?.value;
        const fin = document.getElementById(`fin_${m.id}`)?.checked;
        
        if(h !== undefined || a !== undefined || fin !== undefined) {
          m.homescore = h;
          m.awayscore = a;
          m.finished = fin;
          
          await sb.from('polla_trabajo_matches').update({ homescore: h, awayscore: a, finished: fin }).eq('id', m.id);
          saved++;
        }
      }
      alert(`✓ ${saved} resultado(s) guardado(s)`);
      render();
    };

    window.saveAllAdminChanges = async function() {
      const exact = +document.getElementById('sc_exact').value;
      const outcome = +document.getElementById('sc_outcome').value;
      const champion = +document.getElementById('sc_champion').value;
      const second = +document.getElementById('sc_second').value;
      const third = +document.getElementById('sc_third').value;
      
      const podio_first = document.getElementById('podio_first').value;
      const podio_second = document.getElementById('podio_second').value;
      const podio_third = document.getElementById('podio_third').value;
      
      state.config.scoring = { exact, outcome, champion, second, third };
      state.config.podium_result = { first: podio_first, second: podio_second, third: podio_third };
      
      await sb.from('polla_trabajo_config').update({ scoring: state.config.scoring, podium_result: state.config.podium_result }).eq('id', '1');
      
      let saved = 0;
      for(const m of state.matches) {
        const h = document.getElementById(`res_h_${m.id}`)?.value;
        const a = document.getElementById(`res_a_${m.id}`)?.value;
        const fin = document.getElementById(`fin_${m.id}`)?.checked;
        
        if(h !== undefined || a !== undefined || fin !== undefined) {
          m.homescore = h;
          m.awayscore = a;
          m.finished = fin;
          
          await sb.from('polla_trabajo_matches').update({ homescore: h, awayscore: a, finished: fin }).eq('id', m.id);
          saved++;
        }
      }
      
      alert(`✓ Scoring + Podio actualizado · ${saved} resultado(s) guardado(s)`);
      render();
    };

    window.validateNewMatch = function() {
      const home = (document.getElementById('new_home')?.value ?? '').trim();
      const away = (document.getElementById('new_away')?.value ?? '').trim();
      
      if(home && away && home === away) {
        alert('❌ No puedes usar el mismo país en ambos equipos');
        document.getElementById(home === document.getElementById('new_away').value ? 'new_away' : 'new_home').value = '';
      }
    };

    window.addNewMatch = async function() {
      const home = document.getElementById('new_home').value;
      const away = document.getElementById('new_away').value;
      const datetime = document.getElementById('new_datetime').value;
      const phase = document.getElementById('new_phase').value;
      
      if((home === undefined || home === '') || (away === undefined || away === '') || !datetime) return alert('Llena todos los campos');
      if(home === away) return alert('❌ No puedes usar el mismo país en ambos equipos');
      
      const newId = 'm' + (state.matches.length + 1);
      await sb.from('polla_trabajo_matches').insert([{ 
        id: newId, 
        home, 
        away, 
        group_name: phase, 
        datetime, 
        homescore: '', 
        awayscore: '', 
        finished: false 
      }]);
      
      state.matches.push({ id: newId, home, away, group_name: phase, datetime, homescore: '', awayscore: '', finished: false });
      
      document.getElementById('new_home').value = '';
      document.getElementById('new_away').value = '';
      document.getElementById('new_datetime').value = '';
      document.getElementById('new_phase').value = '';
      
      alert(`✓ Partido agregado: ${home} vs ${away}`);
      render();
    };

    window.saveMatch = async function(mid) {
      const m = state.matches.find(x => x.id === mid);
      const h = document.getElementById(`res_h_${mid}`)?.value;
      const a = document.getElementById(`res_a_${mid}`)?.value;
      const fin = document.getElementById(`fin_${mid}`)?.checked;
      
      m.homescore = h;
      m.awayscore = a;
      m.finished = fin;
      
      await sb.from('polla_trabajo_matches').update({ homescore: h, awayscore: a, finished: fin }).eq('id', mid);
      alert('✓ Resultado guardado');
      render();
    };

    init();
  </script>
</body>
</html>
